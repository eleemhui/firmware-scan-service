services:

  # ── MongoDB primary ───────────────────────────────────────────────────────────
  mongo-primary:
    image: mongo:8
    entrypoint: ["/bin/bash", "/scripts/mongod-filter.sh"]
    command: ["--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo_primary_data:/data/db
      - ./scripts/mongod-filter.sh:/scripts/mongod-filter.sh:ro
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 12

  # ── MongoDB secondary (streaming replication from primary) ───────────────────
  mongo-secondary:
    image: mongo:8
    entrypoint: ["/bin/bash", "/scripts/mongod-filter.sh"]
    command: ["--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo_secondary_data:/data/db
      - ./scripts/mongod-filter.sh:/scripts/mongod-filter.sh:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 12
    depends_on:
      mongo-primary:
        condition: service_healthy

  # ── Replica set initialisation (runs once, then exits) ───────────────────────
  mongo-setup:
    image: mongo:8
    volumes:
      - ./scripts/mongo-setup.sh:/mongo-setup.sh:ro
    entrypoint: ["/bin/bash", "/mongo-setup.sh"]
    depends_on:
      mongo-primary:
        condition: service_healthy
      mongo-secondary:
        condition: service_healthy
    restart: on-failure

  # ── RabbitMQ ─────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:4.2.5-management
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI: http://localhost:15672 (guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  # ── firmware_scan_service (REST API) ─────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      MONGO_URI: mongodb://mongo-primary:27017,mongo-secondary:27017/?replicaSet=rs0&directConnection=false
      MONGO_DB: firmware_db
      AMQP_URL: amqp://guest:guest@rabbitmq:5672/
      PORT: "8080"
      QUEUE_NAME: firmware_scan_jobs
    depends_on:
      mongo-setup:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  # ── firmware_analysis_service (worker / queue consumer) ─────────────────────
  worker:
    deploy:
      replicas: 3
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      MONGO_URI: mongodb://mongo-primary:27017,mongo-secondary:27017/?replicaSet=rs0&directConnection=false
      MONGO_DB: firmware_db
      AMQP_URL: amqp://guest:guest@rabbitmq:5672/
      QUEUE_NAME: firmware_scan_jobs
    depends_on:
      mongo-setup:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    restart: on-failure

volumes:
  mongo_primary_data:
  mongo_secondary_data:
