services:

  # ── MongoDB ───────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:8
    entrypoint: ["/bin/bash", "/scripts/mongod-filter.sh"]
    command: ["--bind_ip_all"]
    volumes:
      - mongo_data:/data/db
      - ./scripts/mongod-filter.sh:/scripts/mongod-filter.sh:ro
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 12

  # ── RabbitMQ ─────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:4.2.5-management
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI: http://localhost:15672 (guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  # ── firmware_scan_service (REST API) ─────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      MONGO_URI: mongodb://mongodb:27017/
      MONGO_DB: firmware_db
      AMQP_URL: amqp://guest:guest@rabbitmq:5672/
      PORT: "8080"
      QUEUE_NAME: firmware_scan_jobs
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  # ── firmware_analysis_service (worker / queue consumer) ─────────────────────
  worker:
    deploy:
      replicas: 3
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      MONGO_URI: mongodb://mongodb:27017/
      MONGO_DB: firmware_db
      AMQP_URL: amqp://guest:guest@rabbitmq:5672/
      QUEUE_NAME: firmware_scan_jobs
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure

volumes:
  mongo_data:
